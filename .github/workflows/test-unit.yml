name: Unit Tests
on: [push, pull_request]
jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Build
        working-directory: backend
        run: go build ./...
      # Runs every DB-free unit test package: engine (C1–C38), AI helpers,
      # email templates, handler fallbacks, auth/crypto primitives.
      - name: Unit tests
        working-directory: backend
        run: |
          go test -count=1 -v \
            ./internal/engine/... \
            ./internal/ai/... \
            ./internal/email/... \
            ./internal/api/handlers/... \
            ./pkg/crypto/...
      - name: API opacity guard
        working-directory: backend
        # Fails if handler code ever leaks internal engine fields.
        run: |
          if grep -rnE "drift|chaos_index|weights|threshold" internal/api/handlers/ | grep -v _test.go ; then
            echo "::error::API opacity violation — internal engine fields referenced in handlers"
            exit 1
          fi
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: TypeScript type-check
        run: npx tsc --noEmit

name: NUViaX — Build & Deploy Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: devprimetek
  API_IMAGE: devprimetek/nuviax-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Backend tests
        working-directory: backend
        run: |
          go mod tidy
          go build ./...
          go test ./... -race || true

  build:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "short_sha=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /var/www/wxr-nuviax
            
            echo "==> Pull latest code..."
            git fetch origin
            git reset --hard origin/main
            
            echo "==> Deploy API..."
            docker pull devprimetek/nuviax-api:${{ needs.build.outputs.image_tag }}
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} \
              docker compose -f infra/docker-compose.yml up -d \
              --no-deps --remove-orphans nuviax_api
            
            echo "==> Health check..."
            sleep 8
            curl -sf http://localhost:8080/health && echo "✓ API healthy" || echo "✗ API not ready"
            
            echo "==> Cleanup..."
            docker image prune -f --filter "until=24h"
            
            echo "==> DONE ✓"

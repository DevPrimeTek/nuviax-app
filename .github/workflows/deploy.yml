name: NUViaX — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: devprimetek
  API_IMAGE: devprimetek/nuviax-api
  WEB_IMAGE: devprimetek/nuviax-web
  LANDING_IMAGE: devprimetek/nuviax-landing

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Backend tests
        working-directory: backend
        run: |
          go mod tidy
          go build ./...
          go test ./... -race || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Frontend tests (skip if not ready)
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci && npm run test -- --passWithNoTests
          else
            echo "Frontend not yet implemented — skipping"
          fi

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "short_sha=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web (skip if not ready)
        if: hashFiles('frontend/Dockerfile') != ''
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Build & push Landing (skip if not ready)
        if: hashFiles('landing/Dockerfile') != ''
        uses: docker/build-push-action@v6
        with:
          context: ./landing
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.LANDING_IMAGE }}:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 55232 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 55232 \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /var/www/wxr-nuviax && \
               git pull origin main && \
               docker pull devprimetek/nuviax-api:${IMAGE_TAG} && \
               IMAGE_TAG=${IMAGE_TAG} docker compose -f infra/docker-compose.yml up -d --no-deps --remove-orphans nuviax_api && \
               echo 'Deploy ${IMAGE_TAG} complete'"

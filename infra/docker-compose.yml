version: '3.9'

# ============================================================
# NUViaX — docker-compose.yml
# Se integrează cu nginx_proxy + acme-companion EXISTENTE
# Pattern identic cu Profixer (jwilder/nginx-proxy)
#
# nginx_proxy  → externă, deja rulează pe server (80/443)
# acme-companion → deja rulează, SSL automat prin VIRTUAL_HOST
# nuviax_net   → internă nouă, izolată de profixer_net
#
# NU include nginx_proxy/acme — deja există!
# ============================================================

networks:
  nginx_proxy:
    external: true          # Același nginx_proxy ca Profixer
  nuviax_net:
    name: nuviax_net
    driver: bridge          # Rețea internă NUViaX izolată

volumes:
  nuviax_pg_data:
    name: nuviax_pg_data
  nuviax_redis_data:
    name: nuviax_redis_data

services:

  # ============================================================
  # 1. POSTGRESQL 16
  # ============================================================
  nuviax_db:
    image: postgres:16-alpine
    container_name: nuviax_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nuviax
      POSTGRES_USER: nuviax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - nuviax_pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nuviax_net
    # FĂRĂ port mapping extern — accesibil doar din nuviax_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuviax -d nuviax"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 2. REDIS 7
  # ============================================================
  nuviax_redis:
    image: redis:7-alpine
    container_name: nuviax_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - nuviax_redis_data:/data
    networks:
      - nuviax_net
    # FĂRĂ port mapping extern
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 3. BACKEND — Go (Framework Engine + API)
  # ============================================================
  nuviax_api:
    image: devprimetek/nuviax-api:${IMAGE_TAG:-latest}
    container_name: nuviax_api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # Server
      PORT: "8080"
      ENV: production
      # Database
      DATABASE_URL: postgres://nuviax:${POSTGRES_PASSWORD}@nuviax_db:5432/nuviax?sslmode=disable
      # Redis
      REDIS_ADDR: nuviax_redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # CORS
      ALLOWED_ORIGINS: https://nuviax.app,https://www.nuviax.app
      # Nginx proxy — SSL auto prin acme-companion existent
      VIRTUAL_HOST: api.nuviax.app
      VIRTUAL_PORT: "8080"
      LETSENCRYPT_HOST: api.nuviax.app
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      nuviax_db:
        condition: service_healthy
      nuviax_redis:
        condition: service_healthy
    networks:
      - nuviax_net
      - nginx_proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================================
  # 4. APLICAȚIA PRINCIPALĂ — Next.js 14 (nuviax.app)
  # ============================================================
  nuviax_app:
    image: devprimetek/nuviax-app:${IMAGE_TAG:-latest}
    container_name: nuviax_app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.nuviax.app
      API_URL: http://nuviax_api:8080
      # Nginx proxy
      VIRTUAL_HOST: nuviax.app,www.nuviax.app
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: nuviax.app,www.nuviax.app
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - nuviax_api
    networks:
      - nuviax_net
      - nginx_proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================================
  # 5. LANDING PAGE — nuviaxapp.com (static Next.js)
  # ============================================================
  nuviax_landing:
    image: devprimetek/nuviax-landing:${IMAGE_TAG:-latest}
    container_name: nuviax_landing
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://nuviax.app
      VIRTUAL_HOST: nuviaxapp.com,www.nuviaxapp.com
      VIRTUAL_PORT: "3001"
      LETSENCRYPT_HOST: nuviaxapp.com,www.nuviaxapp.com
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - nginx_proxy

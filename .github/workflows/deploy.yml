name: NUViaX — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: devprimetek
  API_IMAGE: devprimetek/nuviax-api
  WEB_IMAGE: devprimetek/nuviax-web
  LANDING_IMAGE: devprimetek/nuviax-landing

jobs:
  # ============================================================
  # JOB 1: TEST
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Backend tests
        working-directory: backend
        run: go test ./... -race -coverprofile=coverage.out

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        working-directory: frontend
        run: |
          npm ci
          npm run test -- --passWithNoTests

  # ============================================================
  # JOB 2: BUILD & PUSH IMAGES
  # ============================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "short_sha=sha-$(echo ${{ github.sha }} | head -c7)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Landing
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.LANDING_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3: DEPLOY TO SERVER
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            set -e
            cd /var/www/wxr-nuviax

            echo "Pull latest code"
            git pull origin main

            echo "Pulling images: ${{ needs.build.outputs.image_tag }}"
            docker pull devprimetek/nuviax-api:${{ needs.build.outputs.image_tag }}
            docker pull devprimetek/nuviax-web:${{ needs.build.outputs.image_tag }}
            docker pull devprimetek/nuviax-landing:${{ needs.build.outputs.image_tag }}

            echo "Updating services (rolling)"
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} \
              docker compose -f infra/docker-compose.yml up -d \
              --no-deps --remove-orphans \
              nuviax_api nuviax_web nuviax_landing

            echo "Health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "API healthy"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Health check failed — rolling back"
                IMAGE_TAG=latest \
                  docker compose -f infra/docker-compose.yml up -d \
                  --no-deps nuviax_api nuviax_web nuviax_landing
                exit 1
              fi
              sleep 5
            done

            docker image prune -f --filter "until=24h"
            echo "Deploy ${{ needs.build.outputs.image_tag }} complete"

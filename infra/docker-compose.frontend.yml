version: '3.9'

# ============================================================
# NUViaX Frontend — docker-compose.frontend.yml
# Adaugă acest fișier la /var/www/wxr-nuviax/infra/
# Rulează: docker compose -f docker-compose.yml -f docker-compose.frontend.yml up -d
# ============================================================

services:

  # ============================================================
  # APLICAȚIA PRINCIPALĂ — nuviax.app
  # ============================================================
  nuviax_app:
    image: devprimetek/nuviax-app:latest
    container_name: nuviax_app
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://api.nuviax.app
    networks:
      - nuviax_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nuviax-app.rule=Host(`nuviax.app`) || Host(`www.nuviax.app`)"
      - "traefik.http.routers.nuviax-app.entrypoints=websecure"
      - "traefik.http.routers.nuviax-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.nuviax-app.loadbalancer.server.port=3000"
      # Redirect www → apex
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.nuviax\\.app/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://nuviax.app/$${1}"
      - "traefik.http.routers.nuviax-app.middlewares=www-redirect"

  # ============================================================
  # LANDING PAGE — nuviaxapp.com
  # ============================================================
  nuviax_landing:
    image: devprimetek/nuviax-landing:latest
    container_name: nuviax_landing
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_APP_URL=https://nuviax.app
    networks:
      - nuviax_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nuviax-landing.rule=Host(`nuviaxapp.com`) || Host(`www.nuviaxapp.com`)"
      - "traefik.http.routers.nuviax-landing.entrypoints=websecure"
      - "traefik.http.routers.nuviax-landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.nuviax-landing.loadbalancer.server.port=3001"
      # Redirect www → apex
      - "traefik.http.middlewares.www-landing-redirect.redirectregex.regex=^https://www\\.nuviaxapp\\.com/(.*)"
      - "traefik.http.middlewares.www-landing-redirect.redirectregex.replacement=https://nuviaxapp.com/$${1}"
      - "traefik.http.routers.nuviax-landing.middlewares=www-landing-redirect"

networks:
  nuviax_net:
    external: true
